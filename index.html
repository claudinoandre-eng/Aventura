<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <title>Em busca da cidade perdida </title>
</head>
<body>
    <main>
      <div class="passo ativo" id="passo-0">
        <p>Na biblioteca da escola, um garoto achou um livro, onde falava sobre uma cidade perdida, lá tinha duas escolhas para encontrar a cidade, ele poderia ir para 
          Rio de Janeiro ou Pernambuco</p>
        <button class="btn=proximo" data-proximo="1"></buttonclass>Rio de Janeiro</button>
        <button class="btn=proximo" data-proximo="2"></buttonclass>Pernambuco</button>
      </div>
      <div class="passo" id="passo-1">
        <p>Você decide ir por Rio de janeiro, subindo o pico da tijuca para ver melhor a vista e tentar encontrar a cidade</p>
        <button class="btn=proximo" data-proximo="3"></buttonclass>Procurar as pistas</button>
        <button class="btn=proximo" data-proximo="4"></buttonclass>Voltar e tentar outro caminho</button>
        
      </div>
    </main>
</body>
</html>
